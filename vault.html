<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Vault — My List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon-16x16.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: rgba(255,255,255,0.07);
            --accent: #e8b4ff;
            --accent2: #7dd3fc;
            --accent3: #fbbf24;
            --text: #f0f0f5;
            --muted: #6b7280;
            --card-hover-glow: rgba(232, 180, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* Noise */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9998;
            opacity: 0.4;
        }

        /* Cursor — instant dot, no lag */
        .cursor {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.15s, height 0.15s, background 0.15s;
            box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(232,180,255,0.3);  /* ← the blur */
        }
        .cursor.hovering {
            width: 28px; height: 28px;
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 50%;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0; z-index: 1000;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 5%;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 1.15em;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-decoration: none;
            margin-right: auto;
            white-space: nowrap;
        }

        .nav-status-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            flex: 1;
            min-width: 0;
        }

        .nav-status-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            cursor: none;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .tab-btn.active {
            color: #000;
            background: var(--accent);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .analytics-btn {
            background: transparent;
            border: 1px solid rgba(232,180,255,0.3);
            color: var(--accent);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            cursor: none;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .analytics-btn:hover {
            background: rgba(232,180,255,0.1);
            border-color: var(--accent);
        }

        .analytics-btn.active {
            background: rgba(232,180,255,0.15);
            border-color: var(--accent);
        }

        /* Search */
        .search-wrap {
            position: relative;
        }

        .search-wrap::before {
            content: '⌕';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.1em;
            pointer-events: none;
        }

        .search-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85em;
            padding: 8px 16px 8px 34px;
            border-radius: 10px;
            outline: none;
            width: 200px;
            transition: all 0.3s;
        }

        .search-input::placeholder { color: var(--muted); }
        .search-input:focus {
            border-color: rgba(232,180,255,0.4);
            background: var(--surface);
            width: 240px;
        }

        /* Mobile hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: none;
            padding: 8px;
            border: none;
            background: none;
        }

        .hamburger span {
            width: 22px; height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
            display: block;
        }

        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .mobile-drawer {
            display: none;
            position: fixed;
            top: 64px; left: 0; right: 0;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 5% 20px;
            z-index: 999;
            flex-direction: column;
            gap: 4px;
            max-height: calc(100vh - 64px);
            overflow-y: auto;
        }

        .mobile-drawer.open { display: flex; }
        .mobile-drawer .tab-btn { font-size: 0.95em; padding: 12px 16px; text-align: left; width: 100%; }
        .mobile-drawer .analytics-btn { margin-top: 8px; padding: 12px 16px; font-size: 0.95em; }
        .mobile-search {
            width: 100% !important;
            margin-bottom: 8px;
            font-size: 0.95em;
            padding: 10px 16px;
        }

        .mobile-drawer-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* PAGE */
        .page {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 5% 80px;
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-title-group {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        .section-title-text {
            font-family: 'Cinzel', serif;
            font-size: 1.6em;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .entry-count {
            font-size: 0.85em;
            color: var(--muted);
            font-weight: 600;
        }

        /* GRID */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .anime-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.97);
            position: relative;
            cursor: none;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .anime-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .anime-card:hover {
            border-color: rgba(232,180,255,0.25);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(232,180,255,0.1);
            transform: translateY(-6px) scale(1.02);
        }

        .card-image-wrap {
            position: relative;
            width: 100%;
            padding-top: 140%;
            overflow: hidden;
        }

        .anime-cover {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            background: var(--surface2);
        }

        .anime-card:hover .anime-cover {
            transform: scale(1.06);
        }

        .card-score {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(251,191,36,0.3);
            color: var(--accent3);
            font-size: 0.75em;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .card-body {
            padding: 14px;
        }

        .card-title {
            font-size: 0.85em;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .genre-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .genre-tag {
            font-size: 0.68em;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--muted);
            cursor: none;
            transition: all 0.2s;
        }

        .genre-tag:hover {
            background: rgba(232,180,255,0.15);
            border-color: rgba(232,180,255,0.4);
            color: var(--accent);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state .empty-icon { font-size: 3em; margin-bottom: 16px; }
        .empty-state p { font-size: 1em; }

        /* PAGINATION */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: none;
            transition: all 0.2s;
            min-width: 40px;
            text-align: center;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(232,180,255,0.1);
            border-color: rgba(232,180,255,0.3);
            color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .page-ellipsis {
            color: var(--muted);
            padding: 0 4px;
            font-size: 0.85em;
        }

        /* ANALYTICS */
        #analyticsBoard {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .stat-card:hover {
            border-color: rgba(232,180,255,0.2);
            transform: translateY(-3px);
        }

        .stat-label { font-size: 0.8em; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
        .stat-value {
            font-family: 'Cinzel', serif;
            font-size: 2.4em;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .chart-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Genre filter pills + results inside analytics */
        .genre-filter-bar {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            min-height: 36px;
        }

        .genre-filter-label {
            font-size: 0.75em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
            flex-shrink: 0;
        }

        .genre-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            cursor: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .genre-pill-remove {
            font-size: 1em;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .genre-pill:hover .genre-pill-remove { opacity: 1; }

        .genre-clear-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: none;
            transition: all 0.2s;
        }
        .genre-clear-btn:hover { border-color: rgba(232,180,255,0.4); color: var(--accent); }

        .chart-hint {
            text-align: center;
            font-size: 0.78em;
            color: var(--muted);
            margin-top: 14px;
            letter-spacing: 0.05em;
        }

        /* Genre results section */
        #genreResults {
            margin-top: 40px;
            animation: fadeIn 0.3s ease;
        }

        .genre-results-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .genre-results-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            font-weight: 700;
        }

        .genre-results-count {
            font-size: 0.85em;
            color: var(--muted);
        }

        /* Reuse anime-grid styles but scope to analytics */
        #genreResults .anime-grid {
            margin-bottom: 0;
        }

        /* Mobile */
        @media (max-width: 900px) {
            .nav-status-tabs { display: none; }
            .search-input { display: none; }
            .search-wrap::before { display: none; }
            .hamburger { display: flex; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            body { cursor: auto; }
            .cursor { display: none; }
        }

        @media (max-width: 480px) {
            .anime-grid { grid-template-columns: repeat(2, 1fr); }
            .page { padding: 24px 4% 60px; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>

    <nav id="navbar">
        <a href="index.html" class="nav-logo">ANIME VAULT</a>

        <div class="nav-status-tabs" id="statusTabs">
            <!-- populated by JS -->
        </div>

        <div class="nav-right">
            <div class="search-wrap">
                <input type="text" id="searchInput" class="search-input" placeholder="Search…">
            </div>
            <button class="analytics-btn" id="analyticsBtn">Stats</button>
            <button class="hamburger" id="hamburger" onclick="toggleDrawer()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-drawer" id="mobileDrawer">
        <input type="text" id="mobileSearch" class="search-input mobile-search" placeholder="Search title or genre…">
        <div class="mobile-drawer-section" id="mobileStatusTabs"></div>
        <button class="analytics-btn" id="mobileAnalyticsBtn">Stats</button>
    </div>

    <div class="page">
        <div id="mainContent">
            <div class="section-header">
                <div class="section-title-group">
                    <span class="section-title-text" id="sectionTitle">All Anime</span>
                    <span class="entry-count" id="entryCount">0 entries</span>
                </div>
            </div>

            <div class="anime-grid" id="animeGrid"></div>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <div id="analyticsBoard">
            <div class="section-header">
                <div class="section-title-group">
                    <span class="section-title-text">Viewing Analytics</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Tracked</div>
                    <div class="stat-value" id="statTotal">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Completed</div>
                    <div class="stat-value" id="statCompleted">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Score</div>
                    <div class="stat-value" id="statScore">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Unique Genres</div>
                    <div class="stat-value" id="statGenres">—</div>
                </div>
            </div>

            <div class="chart-wrap">
                <canvas id="genreChart"></canvas>
            </div>

            <p class="chart-hint">Click a slice or legend item to filter · Click again to deselect · Select multiple to intersect</p>

            <div class="genre-filter-bar" id="genreFilterBar"></div>

            <div id="genreResults"></div>
        </div>
    </div>

    <script>
        let allAnime = [];
        let currentFilter = 'All';
        let searchQuery = '';
        let currentPage = 1;
        const ITEMS_PER_PAGE = 24;
        let genreChartInstance = null;
        let selectedGenres = new Set();
        const CHART_COLORS = [
            '#e8b4ff','#7dd3fc','#fbbf24','#86efac','#f9a8d4',
            '#c4b5fd','#67e8f9','#fde68a','#a7f3d0','#fed7aa'
        ];

        // Cursor — instant, no lag
        const cursor = document.getElementById('cursor');

        if (window.innerWidth > 900) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        function addCursorInteraction(el) {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        }

        // Mobile drawer
        function toggleDrawer() {
            document.getElementById('hamburger').classList.toggle('open');
            document.getElementById('mobileDrawer').classList.toggle('open');
        }

        // Load data
        document.addEventListener('DOMContentLoaded', () => {
            fetch('./data.json')
                .then(r => r.json())
                .then(data => {
                    allAnime = data;
                    initApp();
                    // Handle direct link to analytics
                    if (window.location.hash === '#analytics') showAnalytics();
                })
                .catch(err => {
                    console.error('Failed to load data.json', err);
                    document.getElementById('animeGrid').innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1">
                            <div class="empty-icon">⚠️</div>
                            <p>Could not load data.json. Make sure it's in the same directory.</p>
                        </div>`;
                });
        });

        function initApp() {
            const statuses = ['All', ...new Set(allAnime.map(a => a.status))];
            buildTabs(statuses, 'statusTabs', false);
            buildTabs(statuses, 'mobileStatusTabs', true);

            // Desktop search
            document.getElementById('searchInput').addEventListener('input', e => {
                searchQuery = e.target.value;
                currentPage = 1;
                render();
            });

            // Mobile search
            document.getElementById('mobileSearch').addEventListener('input', e => {
                searchQuery = e.target.value;
                document.getElementById('searchInput').value = e.target.value;
                currentPage = 1;
                render();
            });

            document.getElementById('analyticsBtn').addEventListener('click', () => {
                const isActive = document.getElementById('analyticsBtn').classList.toggle('active');
                if (isActive) showAnalytics(); else showGrid();
            });

            document.getElementById('mobileAnalyticsBtn').addEventListener('click', () => {
                toggleDrawer();
                const isActive = document.getElementById('analyticsBtn').classList.toggle('active');
                if (isActive) showAnalytics(); else showGrid();
            });

            render();
        }

        function buildTabs(statuses, containerId, isMobile) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            statuses.forEach(status => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${status === 'All' ? 'active' : ''}`;
                const count = status === 'All' ? allAnime.length : allAnime.filter(a => a.status === status).length;
                btn.textContent = `${status} (${count})`;
                btn.onclick = () => {
                    currentFilter = status;
                    currentPage = 1;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll(`.tab-btn`).forEach(b => {
                        if (b.textContent.startsWith(status)) b.classList.add('active');
                    });
                    document.getElementById('analyticsBtn').classList.remove('active');
                    showGrid();
                    render();
                    if (isMobile) toggleDrawer();
                };
                addCursorInteraction(btn);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';

            const filtered = allAnime.filter(a => {
                const matchStatus = currentFilter === 'All' || a.status === currentFilter;
                const q = searchQuery.toLowerCase();
                const matchSearch = !q || a.title.toLowerCase().includes(q) ||
                    a.genres.some(g => g.toLowerCase().includes(q));
                return matchStatus && matchSearch;
            });

            document.getElementById('sectionTitle').textContent = searchQuery ? `"${searchQuery}"` : currentFilter;
            document.getElementById('entryCount').textContent = `${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}`;

            const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
            if (currentPage > totalPages) currentPage = totalPages;

            const slice = filtered.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            if (slice.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                    <div class="empty-icon">🔍</div>
                    <p>No results found for <strong>"${searchQuery}"</strong></p>
                </div>`;
            } else {
                slice.forEach((anime, i) => {
                    const card = document.createElement('a');
                    card.className = 'anime-card';
                    card.href = `https://myanimelist.net/anime/${anime.id}`;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    const genresHtml = anime.genres.slice(0, 3).map(g =>
                        `<span class="genre-tag" data-genre="${g}">${g}</span>`
                    ).join('');
                    const scoreHtml = anime.score > 0 ? `<div class="card-score">★ ${anime.score}</div>` : '';
                    card.innerHTML = `
                        <div class="card-image-wrap">
                            <img class="anime-cover" src="${anime.image || ''}" loading="lazy"
                                alt="${anime.title}"
                                onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22252%22 fill=%22%231c1c26%22%3E%3Crect width=%22180%22 height=%22252%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%236b7280%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">
                            ${scoreHtml}
                        </div>
                        <div class="card-body">
                            <div class="card-title">${anime.title}</div>
                            <div class="genre-container">${genresHtml}</div>
                        </div>`;

                    // Genre tag click
                    card.querySelectorAll('.genre-tag').forEach(tag => {
                        tag.addEventListener('click', e => {
                            e.preventDefault();
                            e.stopPropagation();
                            const g = tag.dataset.genre;
                            searchQuery = g;
                            document.getElementById('searchInput').value = g;
                            document.getElementById('mobileSearch').value = g;
                            currentPage = 1;
                            render();
                        });
                        addCursorInteraction(tag);
                    });

                    addCursorInteraction(card);
                    grid.appendChild(card);

                    // Staggered reveal
                    setTimeout(() => card.classList.add('visible'), i * 30);
                });
            }

            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const controls = document.getElementById('paginationControls');
            controls.innerHTML = '';
            if (totalPages <= 1) return;

            const makeBtn = (label, page, disabled = false, active = false) => {
                const btn = document.createElement('button');
                btn.className = `page-btn${active ? ' active' : ''}`;
                btn.textContent = label;
                btn.disabled = disabled;
                if (!disabled) {
                    btn.onclick = () => {
                        currentPage = page;
                        render();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    addCursorInteraction(btn);
                }
                return btn;
            };

            controls.appendChild(makeBtn('←', currentPage - 1, currentPage === 1));

            // Smart pagination
            const pages = [];
            if (totalPages <= 7) {
                for (let i = 1; i <= totalPages; i++) pages.push(i);
            } else {
                pages.push(1);
                if (currentPage > 3) pages.push('...');
                for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
                if (currentPage < totalPages - 2) pages.push('...');
                pages.push(totalPages);
            }

            pages.forEach(p => {
                if (p === '...') {
                    const el = document.createElement('span');
                    el.className = 'page-ellipsis';
                    el.textContent = '···';
                    controls.appendChild(el);
                } else {
                    controls.appendChild(makeBtn(p, p, false, p === currentPage));
                }
            });

            controls.appendChild(makeBtn('→', currentPage + 1, currentPage === totalPages));
        }

        function showGrid() {
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('analyticsBoard').style.display = 'none';
        }

        function showAnalytics() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('analyticsBoard').style.display = 'block';
            buildAnalytics();
        }

        function buildAnalytics() {
            const completed = allAnime.filter(a => a.status === 'Completed');
            const scored = allAnime.filter(a => a.score > 0);
            const avg = scored.reduce((s, a) => s + a.score, 0) / (scored.length || 1);
            const genres = new Set(allAnime.flatMap(a => a.genres));

            document.getElementById('statTotal').textContent = allAnime.length;
            document.getElementById('statCompleted').textContent = completed.length;
            document.getElementById('statScore').textContent = avg.toFixed(1);
            document.getElementById('statGenres').textContent = genres.size;

            const genreCounts = {};
            allAnime.forEach(a => a.genres.forEach(g => genreCounts[g] = (genreCounts[g] || 0) + 1));
            const sorted = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const labels = sorted.map(g => g[0]);
            const data = sorted.map(g => g[1]);

            const ctx = document.getElementById('genreChart').getContext('2d');
            if (genreChartInstance) genreChartInstance.destroy();

            genreChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: CHART_COLORS,
                        borderWidth: 2,
                        borderColor: 'transparent',
                        hoverOffset: 16
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements) => {
                        if (!elements.length) return;
                        const genre = labels[elements[0].index];
                        toggleGenreFilter(genre, elements[0].index);
                    },
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e0e0e0',
                                padding: 18,
                                font: { size: 13, family: 'Nunito' },
                                usePointStyle: true,
                                pointStyleWidth: 10
                            },
                            onClick: (event, legendItem, legend) => {
                                const genre = legendItem.text;
                                toggleGenreFilter(genre, legendItem.index);
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const active = selectedGenres.has(ctx.label);
                                    return ` ${ctx.label}: ${ctx.raw} titles${active ? '  ✓ selected' : '  — click to filter'}`;
                                }
                            }
                        }
                    }
                }
            });

            // Re-render results if genres are already selected (e.g. revisiting analytics)
            renderGenreResults();
        }

        function toggleGenreFilter(genre, colorIndex) {
            if (selectedGenres.has(genre)) {
                selectedGenres.delete(genre);
            } else {
                selectedGenres.add(genre);
            }
            updateChartBorders();
            renderFilterPills();
            renderGenreResults();
        }

        function updateChartBorders() {
            if (!genreChartInstance) return;
            const labels = genreChartInstance.data.labels;
            genreChartInstance.data.datasets[0].borderColor = labels.map((label, i) =>
                selectedGenres.has(label) ? '#fff' : 'transparent'
            );
            genreChartInstance.data.datasets[0].borderWidth = labels.map((label, i) =>
                selectedGenres.has(label) ? 3 : 2
            );
            genreChartInstance.data.datasets[0].hoverOffset = 16;
            genreChartInstance.update();
        }

        function renderFilterPills() {
            const bar = document.getElementById('genreFilterBar');
            bar.innerHTML = '';

            if (selectedGenres.size === 0) return;

            const label = document.createElement('span');
            label.className = 'genre-filter-label';
            label.textContent = 'Filtering by:';
            bar.appendChild(label);

            const labels = genreChartInstance ? genreChartInstance.data.labels : [];

            selectedGenres.forEach(genre => {
                const colorIndex = labels.indexOf(genre);
                const color = CHART_COLORS[colorIndex] || '#e8b4ff';

                const pill = document.createElement('span');
                pill.className = 'genre-pill';
                pill.style.background = color + '22';
                pill.style.borderColor = color + '88';
                pill.style.color = color;
                pill.innerHTML = `${genre} <span class="genre-pill-remove">×</span>`;
                pill.addEventListener('click', () => {
                    selectedGenres.delete(genre);
                    updateChartBorders();
                    renderFilterPills();
                    renderGenreResults();
                });
                addCursorInteraction(pill);
                bar.appendChild(pill);
            });

            if (selectedGenres.size > 1) {
                const clearBtn = document.createElement('button');
                clearBtn.className = 'genre-clear-btn';
                clearBtn.textContent = 'Clear all';
                clearBtn.addEventListener('click', () => {
                    selectedGenres.clear();
                    updateChartBorders();
                    renderFilterPills();
                    renderGenreResults();
                });
                addCursorInteraction(clearBtn);
                bar.appendChild(clearBtn);
            }
        }

        function renderGenreResults() {
            const container = document.getElementById('genreResults');

            if (selectedGenres.size === 0) {
                container.innerHTML = '';
                return;
            }

            // AND filter — anime must have ALL selected genres
            const matched = allAnime.filter(a =>
                [...selectedGenres].every(g => a.genres.includes(g))
            );

            const genreList = [...selectedGenres].join(' + ');
            const titleText = selectedGenres.size === 1
                ? `${[...selectedGenres][0]}`
                : `${genreList}`;

            let html = `
                <div class="genre-results-header">
                    <span class="genre-results-title">${titleText}</span>
                    <span class="genre-results-count">${matched.length} ${matched.length === 1 ? 'title' : 'titles'}</span>
                </div>`;

            if (matched.length === 0) {
                html += `<div class="empty-state">
                    <div class="empty-icon" style="font-size:2em;margin-bottom:12px;">⚡</div>
                    <p>No anime found with all selected genres together.</p>
                </div>`;
            } else {
                html += '<div class="anime-grid" style="margin-bottom:40px;">';
                matched.forEach((anime, i) => {
                    const genresHtml = anime.genres.slice(0, 3).map(g => {
                        const isActive = selectedGenres.has(g);
                        const colorIndex = genreChartInstance ? genreChartInstance.data.labels.indexOf(g) : -1;
                        const color = isActive && colorIndex >= 0 ? CHART_COLORS[colorIndex] : null;
                        const style = color ? `background:${color}22;border-color:${color}88;color:${color};` : '';
                        return `<span class="genre-tag" style="${style}">${g}</span>`;
                    }).join('');
                    const scoreHtml = anime.score > 0 ? `<div class="card-score">★ ${anime.score}</div>` : '';
                    html += `
                        <a class="anime-card visible" href="https://myanimelist.net/anime/${anime.id}" target="_blank" rel="noopener noreferrer">
                            <div class="card-image-wrap">
                                <img class="anime-cover" src="${anime.image || ''}" loading="lazy" alt="${anime.title}"
                                    onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22252%22 fill=%22%231c1c26%22%3E%3Crect width=%22180%22 height=%22252%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%236b7280%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">
                                ${scoreHtml}
                            </div>
                            <div class="card-body">
                                <div class="card-title">${anime.title}</div>
                                <div class="genre-container">${genresHtml}</div>
                            </div>
                        </a>`;
                });
                html += '</div>';
            }

            container.innerHTML = html;
        }
    </script>
