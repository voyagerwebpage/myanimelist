<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime Vault</title>
    <style>
        /* --- CSS: Dark Theme & Layout --- */
        :root {
            --bg-color: #121212;
            --nav-bg: rgba(30, 30, 36, 0.85); /* Frosted glass effect */
            --card-bg: #1e1e24;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent-color: #bb86fc;
            --accent-hover: #9965f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 50px;
        }

        /* --- Navigation Bar --- */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent-color);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1em;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-btn.active {
            border-bottom: 2px solid var(--accent-color);
            border-radius: 6px 6px 0 0;
        }

        .search-bar {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background-color: #2a2a32;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5em;
            cursor: pointer;
        }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        #statusMessage {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #333;
        }

        .section-header {
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .anime-count {
            font-size: 0.6em;
            color: var(--text-muted);
        }

        /* --- Grid & Cards --- */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 0.4s ease;
        }

        .anime-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            border-left: 4px solid var(--accent-color);
        }

        .anime-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .anime-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9em;
            align-self: flex-start;
        }

        .anime-link:hover {
            text-decoration: underline;
        }

        /* Add this to your CSS */
        .anime-cover {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
            background-color: #2a2a32; /* Dark placeholder color while loading */
            position: relative;
            overflow: hidden;
        }

        /* Optional: Adds a pulsing animation to the placeholder while it fetches */
        .anime-cover.loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { background-color: #2a2a32; }
            50% { background-color: #3f3f4e; }
            100% { background-color: #2a2a32; }
        }

        /* --- Pagination --- */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .page-btn {
            background-color: var(--card-bg);
            border: 1px solid #444;
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #000;
        }

        .page-btn.active {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .hamburger { display: block; }
            
            .nav-controls {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background-color: var(--card-bg);
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                border-bottom: 1px solid #333;
                display: none; /* Hidden by default */
                box-shadow: 0 10px 15px rgba(0,0,0,0.5);
            }

            .nav-controls.show { display: flex; }

            .nav-links {
                flex-direction: column;
                gap: 5px;
            }

            .nav-btn {
                text-align: left;
                padding: 12px;
                border-radius: 4px;
            }

            .nav-btn.active {
                border-bottom: none;
                border-left: 3px solid var(--accent-color);
            }

            .search-bar { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand">Akshat's Anime Vault</div>
        <button class="hamburger" id="hamburgerBtn">☰</button>
        <div class="nav-controls" id="navControls">
            <div class="nav-links" id="navLinksContainer">
                </div>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search anime...">
        </div>
    </nav>

    <div class="container">
        <div id="statusMessage">Fetching your anime vault...</div>
        
        <div id="mainContent" style="display: none;">
            <div class="section-header">
                <span id="currentCategoryTitle">All Anime</span>
                <span class="anime-count" id="currentCategoryCount">0 Entries</span>
            </div>
            <div class="anime-grid" id="animeGrid"></div>
            <div class="pagination" id="paginationControls"></div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const xmlFileName = './animelist.xml'; 
        let allAnime = []; // Holds every anime from the XML
        let uniqueCategories = []; 
        
        // App State
        let currentFilter = 'All';
        let searchQuery = '';
        let currentPage = 1;
        const itemsPerPage = 24; // Number of cards per page

        // --- DOM Elements ---
        const statusMsg = document.getElementById('statusMessage');
        const mainContent = document.getElementById('mainContent');
        const animeGrid = document.getElementById('animeGrid');
        const navLinksContainer = document.getElementById('navLinksContainer');
        const searchInput = document.getElementById('searchInput');
        const categoryTitle = document.getElementById('currentCategoryTitle');
        const categoryCount = document.getElementById('currentCategoryCount');
        const paginationControls = document.getElementById('paginationControls');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navControls = document.getElementById('navControls');

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            fetch(xmlFileName)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.text();
                })
                .then(xmlString => {
                    statusMsg.style.display = 'none';
                    mainContent.style.display = 'block';
                    parseXML(xmlString);              
                })
                .catch(error => {
                    statusMsg.textContent = 'Failed to load animelist.xml. Ensure it is in the repository.';
                    statusMsg.style.color = '#ff6b6b';
                });

            // Event Listeners for Search and Mobile Menu
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                currentPage = 1; // Reset to page 1 on new search
                render();
            });

            hamburgerBtn.addEventListener('click', () => {
                navControls.classList.toggle('show');
            });
        });

        // --- Parsing XML ---
        function parseXML(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const animes = xmlDoc.getElementsByTagName("anime");

            const categorySet = new Set();

            for (let i = 0; i < animes.length; i++) {
                const node = animes[i];
                const titleNode = node.getElementsByTagName("series_title")[0];
                const statusNode = node.getElementsByTagName("my_status")[0];
                const idNode = node.getElementsByTagName("series_animedb_id")[0];

                if (!titleNode || !statusNode) continue;

                const title = titleNode.textContent;
                const status = statusNode.textContent;
                const id = idNode ? idNode.textContent : null;

                allAnime.push({ title, status, id });
                categorySet.add(status);
            }

            // Sort alphabetically for consistency
            allAnime.sort((a, b) => a.title.localeCompare(b.title));
            
            // Build the Navigation tabs
            uniqueCategories = ["All", ...Array.from(categorySet)];
            buildNavigation();
            render();
        }

        // --- Build UI Components ---
        function buildNavigation() {
            navLinksContainer.innerHTML = '';
            
            uniqueCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `nav-btn ${category === currentFilter ? 'active' : ''}`;
                btn.textContent = category;
                
                btn.addEventListener('click', () => {
                    currentFilter = category;
                    currentPage = 1; // Reset to page 1 when changing tabs
                    searchInput.value = ''; // Optional: clear search on tab change
                    searchQuery = '';
                    
                    // Update active class
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Close mobile menu if open
                    navControls.classList.remove('show');
                    
                    render();
                });
                
                navLinksContainer.appendChild(btn);
            });
        }

        function render() {
            const filteredData = allAnime.filter(anime => {
                const matchesCategory = currentFilter === 'All' || anime.status === currentFilter;
                const matchesSearch = anime.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            categoryTitle.textContent = currentFilter === 'All' ? 'All Anime' : currentFilter;
            categoryCount.textContent = `${filteredData.length} Entries`;

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages; 
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filteredData.slice(startIndex, startIndex + itemsPerPage);

            animeGrid.innerHTML = '';
            
            if (paginatedData.length === 0) {
                animeGrid.innerHTML = `<p style="grid-column: 1/-1; color: var(--text-muted);">No anime found.</p>`;
            } else {
                paginatedData.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';

                    // We add an <img> tag with a specific ID so we can target it later
                    let html = `
                        <img class="anime-cover loading" id="cover-${anime.id}" alt="Cover for ${anime.title}">
                        <div class="anime-title">${anime.title}</div>
                    `;
                    
                    if (anime.id) {
                        html += `<a class="anime-link" href="https://myanimelist.net/anime/${anime.id}" target="_blank">View on MAL ↗</a>`;
                    }
                    
                    card.innerHTML = html;
                    animeGrid.appendChild(card);
                });

                // Trigger the sequential image fetcher for ONLY the cards currently visible
                fetchImages(paginatedData);
            }

            renderPagination(totalPages);
        }


        function renderPagination(totalPages) {
            paginationControls.innerHTML = '';
            if (totalPages <= 1) return; // Hide pagination if only 1 page

            // Prev Button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '← Prev';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); }
            });
            paginationControls.appendChild(prevBtn);

            // Page Numbers (Simplified logic to show all pages, or a subset if you have many)
            for (let i = 1; i <= totalPages; i++) {
                // If you have a massive list, you might want to limit the buttons shown here.
                // For now, it shows all page numbers.
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i; 
                    render();
                    window.scrollTo(0,0); // Scroll back to top of grid
                });
                paginationControls.appendChild(pageBtn);
            }

            // Next Button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = 'Next →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) { currentPage++; render(); window.scrollTo(0,0); }
            });
            paginationControls.appendChild(nextBtn);
        }

        async function fetchImages(animeList) {
            for (const anime of animeList) {
                if (!anime.id) continue;

                const imgElement = document.getElementById(`cover-${anime.id}`);
                
                // Skip if this image has already been loaded
                if (imgElement && imgElement.src) continue; 

                try {
                    const response = await fetch(`https://api.jikan.moe/v4/anime/${anime.id}`);
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Get the image URL from Jikan's response
                        const imageUrl = data.data.images.jpg.large_image_url;
                        
                        if (imgElement) {
                            imgElement.src = imageUrl;
                            imgElement.classList.remove('loading'); // Stop the pulse animation
                        }
                    }
                    
                    // WAIT 400ms BEFORE THE NEXT REQUEST (Keeps us under 3 requests/sec)
                    await new Promise(resolve => setTimeout(resolve, 400)); 
                    
                } catch (error) {
                    console.error(`Failed to fetch image for ${anime.title}`, error);
                    if (imgElement) imgElement.classList.remove('loading');
                }
            }
        }
    </script>
</body>
</html>
